<div id="app" style="max-width: 720px; margin: 0 auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <div style="margin-bottom: 1.5rem;">
    <div style="font-size: 12px; font-weight: 700; letter-spacing: 2px; color: #1E2761;">HKAIVERSE</div>
    <h2 style="margin: 4px 0 2px; font-size: 20px; font-weight: 600; color: #17193A;">Employee ID generator</h2>
    <p style="margin: 0; font-size: 13px; color: #5B5F86;">Assigns the next sequential ID per role and year, and remembers every ID that's been issued.</p>
  </div>

  <div id="banner" style="display:none; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem;"></div>

  <div style="background: #F2F4FB; border-radius: 12px; padding: 1.1rem 1.25rem; margin-bottom: 1.5rem;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
      <div>
        <label style="display:block; font-size: 12px; color:#5B5F86; margin-bottom: 4px;">Full name</label>
        <input id="nameInput" type="text" placeholder="e.g. Priya Sharma" style="width:100%; box-sizing:border-box; padding: 8px 10px; border-radius: 6px; border: 1px solid #D8DCEE; font-size: 14px;" />
      </div>
      <div>
        <label style="display:block; font-size: 12px; color:#5B5F86; margin-bottom: 4px;">Role</label>
        <select id="roleInput" style="width:100%; box-sizing:border-box; padding: 8px 10px; border-radius: 6px; border: 1px solid #D8DCEE; font-size: 14px; background: white;">
          <option value="D">Director</option>
          <option value="E" selected>Employee</option>
          <option value="I">Intern / Student</option>
          <option value="C">Contractor</option>
        </select>
      </div>
    </div>
    <div style="display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: end;">
      <div>
        <label style="display:block; font-size: 12px; color:#5B5F86; margin-bottom: 4px;">Year joined</label>
        <input id="yearInput" type="number" style="width:100%; box-sizing:border-box; padding: 8px 10px; border-radius: 6px; border: 1px solid #D8DCEE; font-size: 14px;" />
      </div>
      <button id="generateBtn" style="padding: 9px 18px; border-radius: 6px; border: none; background: #1E2761; color: white; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;">Generate ID</button>
    </div>
  </div>

  <div id="resultCard" style="display:none; background: #1E2761; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; color: white;">
    <div style="font-size: 12px; color: #9BA0D6; letter-spacing: 1px;">NEWLY ASSIGNED ID</div>
    <div id="resultId" style="font-size: 26px; font-weight: 700; margin-top: 2px;"></div>
    <div id="resultName" style="font-size: 13px; color: #CADCFC; margin-top: 2px;"></div>
  </div>

  <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 8px;">
    <h3 style="font-size: 14px; font-weight: 600; color:#17193A; margin:0;">Roster</h3>
    <input id="searchInput" type="text" placeholder="Search name or ID" style="padding: 6px 10px; border-radius: 6px; border: 1px solid #D8DCEE; font-size: 13px; width: 200px;" />
  </div>
  <div id="rosterEmpty" style="display:none; padding: 24px; text-align:center; color:#5B5F86; font-size: 13px; background:#F2F4FB; border-radius: 8px;">No IDs assigned yet. Generate the first one above.</div>
  <div id="rosterLoading" style="padding: 16px; text-align:center; color:#5B5F86; font-size: 13px;">Loading roster...</div>
  <table id="rosterTable" style="display:none; width:100%; border-collapse: collapse; font-size: 13px;">
    <thead>
      <tr style="text-align:left; color:#5B5F86; border-bottom: 1px solid #D8DCEE;">
        <th style="padding: 6px 4px;">ID</th>
        <th style="padding: 6px 4px;">Name</th>
        <th style="padding: 6px 4px;">Role</th>
        <th style="padding: 6px 4px;">Joined</th>
      </tr>
    </thead>
    <tbody id="rosterBody"></tbody>
  </table>
</div>

<script>
(function() {
  const ROLE_LABELS = { D: 'Director', E: 'Employee', I: 'Intern / Student', C: 'Contractor' };
  const STORAGE_KEY = 'hkaiverse-employee-roster';
  let roster = [];

  const el = (id) => document.getElementById(id);
  const yearInput = el('yearInput');
  yearInput.value = new Date().getFullYear();

  function showBanner(msg, type) {
    const b = el('banner');
    b.style.display = 'block';
    b.textContent = msg;
    b.style.background = type === 'error' ? '#FCEBEB' : '#EAF3DE';
    b.style.color = type === 'error' ? '#791F1F' : '#27500A';
  }
  function hideBanner() { el('banner').style.display = 'none'; }

  async function loadRoster() {
    el('rosterLoading').style.display = 'block';
    try {
      const result = await window.storage.get(STORAGE_KEY, true);
      roster = result && result.value ? JSON.parse(result.value) : [];
    } catch (e) {
      roster = [];
    }
    el('rosterLoading').style.display = 'none';
    renderRoster();
  }

  async function saveRoster() {
    try {
      const result = await window.storage.set(STORAGE_KEY, JSON.stringify(roster), true);
      if (!result) {
        showBanner('Could not save the roster. Your ID was generated but may not persist \u2014 try again.', 'error');
      }
    } catch (e) {
      showBanner('Storage error \u2014 the ID was generated but could not be saved.', 'error');
    }
  }

  function nextId(role, year) {
    const yy = String(year).slice(-2);
    const existing = roster.filter(r => r.role === role && r.year === year);
    const seq = existing.length + 1;
    const seqStr = String(seq).padStart(3, '0');
    return `HKAI-${role}${yy}-${seqStr}`;
  }

  function renderRoster(filter) {
    const body = el('rosterBody');
    const table = el('rosterTable');
    const empty = el('rosterEmpty');
    body.innerHTML = '';

    let rows = [...roster].sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
    if (filter) {
      const f = filter.toLowerCase();
      rows = rows.filter(r => r.name.toLowerCase().includes(f) || r.id.toLowerCase().includes(f));
    }

    if (rows.length === 0) {
      table.style.display = 'none';
      empty.style.display = 'block';
      if (filter) empty.textContent = 'No matches found.';
      else empty.textContent = 'No IDs assigned yet. Generate the first one above.';
      return;
    }
    empty.style.display = 'none';
    table.style.display = 'table';

    rows.forEach(r => {
      const tr = document.createElement('tr');
      tr.style.borderBottom = '1px solid #EEF0F8';
      tr.innerHTML = `
        <td style="padding: 7px 4px; font-weight: 600; color:#1E2761;">${r.id}</td>
        <td style="padding: 7px 4px; color:#17193A;">${r.name}</td>
        <td style="padding: 7px 4px; color:#5B5F86;">${ROLE_LABELS[r.role] || r.role}</td>
        <td style="padding: 7px 4px; color:#5B5F86;">${r.year}</td>
      `;
      body.appendChild(tr);
    });
  }

  el('generateBtn').addEventListener('click', async function() {
    hideBanner();
    const name = el('nameInput').value.trim();
    const role = el('roleInput').value;
    const year = parseInt(el('yearInput').value, 10);

    if (!name) {
      showBanner('Enter a name before generating an ID.', 'error');
      return;
    }
    if (!year || year < 2000 || year > 2100) {
      showBanner('Enter a valid year.', 'error');
      return;
    }

    const id = nextId(role, year);
    const record = { id, name, role, year, addedAt: Date.now() };
    roster.push(record);
    await saveRoster();

    el('resultCard').style.display = 'block';
    el('resultId').textContent = id;
    el('resultName').textContent = `${name} \u2014 ${ROLE_LABELS[role]}`;

    el('nameInput').value = '';
    renderRoster(el('searchInput').value);
  });

  el('searchInput').addEventListener('input', function(e) {
    renderRoster(e.target.value);
  });

  el('nameInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') el('generateBtn').click();
  });

  loadRoster();
})();
</script>
